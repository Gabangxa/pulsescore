<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseScore — Give feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui,-apple-system,sans-serif;
      background: #f3f4f6; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #1a1a2e; padding: 24px;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 40px;
      max-width: 480px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      animation: pop 0.3s ease;
    }
    .brand { font-size: 13px; font-weight: 700; color: #6366f1; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 800; line-height: 1.3; margin: 0 0 28px; }
    .score-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .score-btn {
      width: 40px; height: 40px; border: 1.5px solid #d1d5db; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer; background: #fff; color: #374151;
      transition: all 0.1s;
    }
    .score-btn:hover { border-color: #6366f1; color: #6366f1; }
    .score-btn.selected { background: #6366f1; color: #fff; border-color: #6366f1; }
    .score-labels { display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; margin-bottom: 28px; }
    .comment-section { display: none; }
    .comment-section.visible { display: block; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    textarea {
      width: 100%; border: 1.5px solid #d1d5db; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      color: #1a1a2e; resize: vertical; min-height: 80px;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: #6366f1; }
    .submit-btn {
      display: block; width: 100%; background: #6366f1; color: #fff;
      border: none; border-radius: 8px; padding: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #4f46e5; }
    .submit-btn:disabled { background: #c7d2fe; cursor: not-allowed; }

    .thankyou { display: none; text-align: center; }
    .thankyou.visible { display: block; }
    .thankyou-icon { font-size: 56px; margin-bottom: 16px; }
    .thankyou h2 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
    .thankyou p { font-size: 15px; color: #6b7280; line-height: 1.5; }

    @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">PulseScore</div>

  <div id="survey-form">
    <h1>How likely are you to recommend us to a friend or colleague?</h1>

    <div class="score-buttons" id="score-buttons">
      <!-- filled by JS -->
    </div>
    <div class="score-labels">
      <span>0 — Not at all likely</span>
      <span>10 — Extremely likely</span>
    </div>

    <div class="comment-section" id="comment-section">
      <label for="comment">What's the main reason for your score?</label>
      <textarea id="comment" placeholder="Tell us more (optional)..."></textarea>
      <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">Submit feedback →</button>
    </div>
  </div>

  <div class="thankyou" id="thankyou">
    <div class="thankyou-icon">🙏</div>
    <h2>Thank you for your feedback!</h2>
    <p>Your response helps us build a better product. We read every submission.</p>
  </div>
</div>

<script>
  let selectedScore = null;
  const token = window.location.pathname.split('/').pop();

  // Build score buttons 0–10
  const container = document.getElementById('score-buttons');
  for (let i = 0; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'score-btn';
    btn.textContent = i;
    btn.onclick = () => selectScore(i);
    container.appendChild(btn);
  }

  function selectScore(score) {
    selectedScore = score;
    document.querySelectorAll('.score-btn').forEach((b, i) => {
      b.classList.toggle('selected', i === score);
    });
    document.getElementById('comment-section').classList.add('visible');
    document.getElementById('comment').focus();
  }

  async function submitSurvey() {
    if (selectedScore === null) return;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const comment = document.getElementById('comment').value;

    try {
      const res = await fetch('/api/response', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ score: selectedScore, comment, token })
      });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('survey-form').style.display = 'none';
        document.getElementById('thankyou').classList.add('visible');
      } else {
        btn.disabled = false;
        btn.textContent = 'Submit feedback →';
        alert('Something went wrong. Please try again.');
      }
    } catch {
      btn.disabled = false;
      btn.textContent = 'Submit feedback →';
      alert('Network error. Please try again.');
    }
  }
</script>
</body>
</html>
